<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmos — Weather</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080c14;
        --surface: #0e1520;
        --surface2: #141d2e;
        --accent: #4af0c4;
        --accent2: #4a8ff0;
        --warm: #f0a84a;
        --cold: #4ab8f0;
        --text: #e8edf5;
        --muted: #5a6a80;
        --border: rgba(255, 255, 255, 0.06);
      }

      body {
        font-family: "DM Mono", monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Atmospheric background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 20%,
            rgba(74, 240, 196, 0.06) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 60% at 80% 80%,
            rgba(74, 143, 240, 0.07) 0%,
            transparent 70%
          );
        pointer-events: none;
      }

      /* Floating particles */
      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: drift linear infinite;
      }

      @keyframes drift {
        0% {
          opacity: 0;
          transform: translateY(100vh) scale(0);
        }
        10% {
          opacity: 0.4;
        }
        90% {
          opacity: 0.1;
        }
        100% {
          opacity: 0;
          transform: translateY(-10vh) scale(1);
        }
      }

      /* Grid lines */
      .grid-overlay {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(74, 240, 196, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(74, 240, 196, 0.025) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }

      /* Main card */
      .card {
        position: relative;
        width: min(520px, 95vw);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(74, 240, 196, 0.05);
      }

      /* Header */
      .header {
        padding: 28px 32px 22px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.5px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 12px var(--accent);
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 4px var(--accent);
        }
      }

      .status-badge {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 20px;
      }

      /* Big temp display */
      .hero {
        padding: 32px 32px 24px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }

      .hero-label {
        font-size: 10px;
        letter-spacing: 0.15em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .hero-city {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -1px;
        line-height: 1;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--text), var(--muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        transition: all 0.5s ease;
      }

      .hero-temp {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin-bottom: 4px;
      }

      .temp-value {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 80px;
        line-height: 1;
        letter-spacing: -4px;
        transition: all 0.4s ease;
      }

      .temp-unit {
        font-size: 24px;
        color: var(--muted);
        margin-top: 14px;
        font-family: "Syne", sans-serif;
      }

      .hero-desc {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      .temp-bar {
        position: absolute;
        right: 32px;
        top: 32px;
        bottom: 32px;
        width: 4px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }

      .temp-bar-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        border-radius: 4px;
        transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Controls */
      .controls {
        padding: 20px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--accent);
        color: #080c14;
        font-weight: 400;
      }

      .btn-primary:hover {
        background: #5fffd4;
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(74, 240, 196, 0.3);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-primary.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-top-color: #080c14;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }

      .btn-primary.loading .spinner {
        display: block;
      }
      .btn-primary.loading .btn-icon {
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .sort-btn {
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 10px 14px;
      }

      .sort-btn:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.15);
      }
      .sort-btn.active {
        color: var(--accent);
        border-color: rgba(74, 240, 196, 0.3);
      }

      .msg {
        margin-left: auto;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      .msg.error {
        color: #f04a4a;
      }
      .msg.success {
        color: var(--accent);
      }

      /* List */
      .list {
        max-height: 320px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      .list::-webkit-scrollbar {
        width: 4px;
      }
      .list::-webkit-scrollbar-thumb {
        background: var(--surface2);
        border-radius: 4px;
      }

      .list-item {
        padding: 16px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition: background 0.15s ease;
        animation: slideIn 0.4s ease both;
      }

      .list-item:last-child {
        border-bottom: none;
      }
      .list-item:hover {
        background: var(--surface2);
      }
      .list-item.active {
        background: rgba(74, 240, 196, 0.05);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .item-rank {
        font-size: 10px;
        color: var(--muted);
        width: 20px;
        text-align: right;
        flex-shrink: 0;
      }

      .item-icon {
        font-size: 22px;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
      }

      .item-info {
        flex: 1;
        min-width: 0;
      }

      .item-city {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-sub {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.05em;
        margin-top: 2px;
      }

      .item-temp {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -1px;
        flex-shrink: 0;
      }

      .item-bar {
        width: 40px;
        height: 3px;
        background: var(--surface2);
        border-radius: 2px;
        overflow: hidden;
        flex-shrink: 0;
      }

      .item-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Footer */
      .footer {
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
      }

      .footer-text {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .footer-stats {
        display: flex;
        gap: 20px;
      }

      .stat {
        text-align: right;
      }
      .stat-val {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 14px;
        color: var(--accent);
      }
      .stat-key {
        font-size: 9px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Empty state */
      .empty {
        padding: 48px 32px;
        text-align: center;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
        opacity: 0.4;
      }
      .empty-text {
        font-size: 12px;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="particles" id="particles"></div>
    <div class="grid-overlay"></div>

    <div class="card">
      <!-- Header -->
      <div class="header">
        <div class="logo">
          <div class="logo-dot"></div>
          ATMOS
        </div>
        <div class="status-badge" id="status-badge">STANDBY</div>
      </div>

      <!-- Hero display -->
      <div class="hero">
        <div class="hero-label">Currently viewing</div>
        <div class="hero-city" id="hero-city">—</div>
        <div class="hero-temp">
          <div class="temp-value" id="hero-temp" style="color: var(--muted)">
            --
          </div>
          <div class="temp-unit">°C</div>
        </div>
        <div class="hero-desc" id="hero-desc">Select a city below</div>
        <div class="temp-bar">
          <div
            class="temp-bar-fill"
            id="temp-bar-fill"
            style="height: 0%; background: var(--muted)"
          ></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-primary" onclick="loadData()" id="load-btn">
          <span class="btn-icon">↻</span>
          <div class="spinner"></div>
          Refresh
        </button>
        <button
          class="btn sort-btn active"
          onclick="sortBy('temp')"
          id="sort-temp"
        >
          Temp ↓
        </button>
        <button class="btn sort-btn" onclick="sortBy('city')" id="sort-city">
          A–Z
        </button>
        <span class="msg" id="msg">Click refresh to load</span>
      </div>

      <!-- List -->
      <div class="list" id="list">
        <div class="empty">
          <div class="empty-icon">🌐</div>
          <div class="empty-text">No data loaded yet</div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-text">Weather Station v2.0</div>
        <div class="footer-stats">
          <div class="stat">
            <div class="stat-val" id="stat-avg">--</div>
            <div class="stat-key">Avg °C</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-count">0</div>
            <div class="stat-key">Cities</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const apiUrl = "https://localhost:5001/api/weather";

      // Mock data for demo
      const mockData = [
        { city: "Dhaka", temperature: 34 },
        { city: "Kolkata", temperature: 31 },
        { city: "London", temperature: 12 },
        { city: "Tokyo", temperature: 22 },
        { city: "New York", temperature: 18 },
        { city: "Dubai", temperature: 21 },
        { city: "Sydney", temperature: 26 },
        { city: "Toronto", temperature: 8 },
      ];

      let allData = [];
      let currentSort = "temp";
      let selectedIndex = 0;

      // Particles
      function createParticles() {
        const container = document.getElementById("particles");
        for (let i = 0; i < 18; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 3 + 1;
          p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * 8}s;
      background: ${Math.random() > 0.5 ? "#4af0c4" : "#4a8ff0"};
    `;
          container.appendChild(p);
        }
      }

      function getWeatherIcon(temp) {
        if (temp >= 38) return "🔥";
        if (temp >= 30) return "☀️";
        if (temp >= 22) return "⛅";
        if (temp >= 14) return "🌥";
        if (temp >= 6) return "🌨";
        return "❄️";
      }

      function getTempColor(temp) {
        if (temp >= 35) return "#f04a4a";
        if (temp >= 25) return "#f0a84a";
        if (temp >= 15) return "#4af0c4";
        if (temp >= 5) return "#4ab8f0";
        return "#4a8ff0";
      }

      function getTempPercent(temp) {
        return Math.min(100, Math.max(5, ((temp + 10) / 60) * 100));
      }

      function setHero(item) {
        const color = getTempColor(item.temperature);
        document.getElementById("hero-city").textContent = item.city;
        document.getElementById("hero-temp").textContent = item.temperature;
        document.getElementById("hero-temp").style.color = color;
        document.getElementById("hero-desc").textContent =
          getWeatherIcon(item.temperature) +
          "  " +
          getTempLabel(item.temperature);
        const fill = document.getElementById("temp-bar-fill");
        fill.style.height = getTempPercent(item.temperature) + "%";
        fill.style.background = color;
      }

      function getTempLabel(t) {
        if (t >= 38) return "Extreme heat";
        if (t >= 30) return "Hot & sunny";
        if (t >= 22) return "Warm & pleasant";
        if (t >= 14) return "Mild & cloudy";
        if (t >= 6) return "Cool & chilly";
        return "Cold & freezing";
      }

      function renderList(data) {
        const list = document.getElementById("list");
        if (!data.length) {
          list.innerHTML = `<div class="empty"><div class="empty-icon">🌫</div><div class="empty-text">No cities found</div></div>`;
          return;
        }

        const minT = Math.min(...data.map((d) => d.temperature));
        const maxT = Math.max(...data.map((d) => d.temperature));
        const range = maxT - minT || 1;

        list.innerHTML = data
          .map((item, i) => {
            const color = getTempColor(item.temperature);
            const pct = (((item.temperature - minT) / range) * 100).toFixed(0);
            const delay = i * 60;
            return `
      <div class="list-item ${i === selectedIndex ? "active" : ""}"
           style="animation-delay:${delay}ms"
           onclick="selectItem(${i})">
        <span class="item-rank">${String(i + 1).padStart(2, "0")}</span>
        <span class="item-icon">${getWeatherIcon(item.temperature)}</span>
        <div class="item-info">
          <div class="item-city">${item.city}</div>
          <div class="item-sub">${getTempLabel(item.temperature).toUpperCase()}</div>
        </div>
        <div class="item-bar">
          <div class="item-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="item-temp" style="color:${color}">${item.temperature}°</div>
      </div>
    `;
          })
          .join("");
      }

      function selectItem(i) {
        selectedIndex = i;
        setHero(allData[i]);
        renderList(allData);
      }

      function sortBy(key) {
        currentSort = key;
        document
          .getElementById("sort-temp")
          .classList.toggle("active", key === "temp");
        document
          .getElementById("sort-city")
          .classList.toggle("active", key === "city");

        if (key === "temp") {
          allData.sort((a, b) => b.temperature - a.temperature);
        } else {
          allData.sort((a, b) => a.city.localeCompare(b.city));
        }
        selectedIndex = 0;
        if (allData.length) setHero(allData[0]);
        renderList(allData);
      }

      function updateStats(data) {
        const avg = data.length
          ? Math.round(
              data.reduce((s, d) => s + d.temperature, 0) / data.length,
            )
          : "--";
        document.getElementById("stat-avg").textContent =
          avg !== "--" ? avg + "°" : "--";
        document.getElementById("stat-count").textContent = data.length;
      }

      async function loadData() {
        const btn = document.getElementById("load-btn");
        const msg = document.getElementById("msg");
        const badge = document.getElementById("status-badge");

        btn.classList.add("loading");
        msg.className = "msg";
        msg.textContent = "Fetching...";
        badge.textContent = "LOADING";

        try {
          const response = await fetch(apiUrl);
          if (!response.ok) throw new Error("Server error: " + response.status);
          const data = await response.json();
          allData = data;
          msg.className = "msg success";
          msg.textContent = "✓ Live data";
          badge.textContent = "LIVE";
        } catch (e) {
          // Use mock data for demo
          await new Promise((r) => setTimeout(r, 900));
          allData = [...mockData];
          msg.className = "msg";
        //   msg.textContent = "Demo mode";
        //   badge.textContent = "DEMO";
        }

        sortBy(currentSort);
        updateStats(allData);
        btn.classList.remove("loading");
      }

      createParticles();
      window.onload = loadData;
    </script>
  </body>
</html>
